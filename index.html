<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samuel Fashion | Store 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="toast">Item adicionado! 🚀</div>
<div id="overlay" onclick="toggleCart()"></div>

<div id="authScreen" class="auth-container">
    <div class="auth-box">
        <h2 id="authTitle">Acessar Conta</h2>
        <form id="authForm" onsubmit="handleAuth(event)">
            <input type="text" id="authName" placeholder="Seu Nome (Apenas para cadastro)" style="display: none;">
            <input type="email" id="authEmail" placeholder="E-mail" required>
            <input type="password" id="authPassword" placeholder="Senha" required>
            <select id="authRole">
                <option value="client">Sou Cliente</option>
                <option value="admin">Sou Administrador</option>
            </select>
            <button type="submit" class="btn-add" style="width: 100%; margin-top: 10px;">Confirmar</button>
        </form>
        <p onclick="toggleAuthMode()" id="toggleAuthText" style="margin-top: 15px; font-size: 0.85rem; cursor: pointer; text-align: center; text-decoration: underline;">
            Não tem conta? Cadastre-se aqui
        </p>
    </div>
</div>

<div id="adminPanel" style="display: none; padding: 2rem 5%;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
        <h1>Painel do Administrador 🛠️</h1>
        <button class="filter-btn" onclick="logout()">Sair</button>
    </div>

    <div class="admin-grid">
        <div class="shipping-box" style="border-style: solid;">
            <h3>Cadastrar Novo Produto</h3>
            <form onsubmit="handleCreateProduct(event)" style="display: flex; flex-direction: column; gap: 10px; margin-top: 15px;">
                <input type="text" id="prodTitulo" class="shipping-input" placeholder="Título do Produto" required>
                <input type="number" id="prodPreco" class="shipping-input" placeholder="Preço (Ex: 159.99)" step="0.01" required>
                <input type="text" id="prodImg" class="shipping-input" placeholder="URL da Imagem" required>
                <input type="text" id="prodMarca" class="shipping-input" placeholder="Marca (nike, adidas, shein...)" required>
                <input type="text" id="prodKeywords" class="shipping-input" placeholder="Palavras-chave para busca" required>
                
                <select id="prodCategoria" class="shipping-input" required>
                    <option value="">Escolha a Categoria</option>
                    <option value="tenis">Tênis</option>
                    <option value="bone">Boné</option>
                    <option value="roupa">Roupa</option>
                    <option value="calca">Calça</option>
                    <option value="cueca">Cueca</option>
                    <option value="acessorio">Acessório</option>
                </select>

                <input type="text" id="prodTamanhos" class="shipping-input" placeholder="Tamanhos separados por vírgula (Ex: P,M,G ou 40,41)" required>
                <input type="number" id="prodEstoque" class="shipping-input" placeholder="Quantidade em Estoque" required>
                
                <button type="submit" class="btn-add">Cadastrar Produto</button>
            </form>
        </div>

        <div>
            <h3>Estoque Atual</h3>
            <div id="adminInventory" style="margin-top: 15px;"></div>
        </div>
    </div>
</div>

<div id="clientStore" style="display: none;">
    <header>
        <div class="logo">Samuel Fashion</div>
        <div style="display: flex; gap: 12px; align-items: center;">
            <span id="welcomeUser" style="font-size: 0.9rem; font-weight: 600;"></span>
            <button class="btn-icon" onclick="toggleTheme()" style="background:none; border:1px solid var(--border); color:var(--text)">🌓</button>
            <button class="btn-icon" onclick="toggleCart()">
                🛒 <span id="cartCount">0</span>
            </button>
            <button class="filter-btn" onclick="logout()" style="padding: 8px 15px;">Sair</button>
        </div>
    </header>

    <div id="cartDrawer">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2>Meu Carrinho</h2>
            <button onclick="toggleCart()" style="background:none; border:none; font-size:1.5rem; cursor:pointer; color:var(--text)">✕</button>
        </div>
        
        <div class="cart-items" id="cartItems"></div>

        <div class="shipping-box">
            <label style="font-size: 0.8rem; font-weight: 700;">CALCULAR FRETE</label>
            <div class="shipping-input-group">
                <input type="text" id="cepInput" class="shipping-input" placeholder="00000-000" maxlength="9">
                <button class="btn-calc" onclick="calculateShipping()">Calcular</button>
            </div>
            <div id="shippingResult" style="font-size: 0.75rem; margin-top: 8px; color: var(--accent); font-weight: 600;"></div>
        </div>

        <div id="summary">
            <div class="summary-line">
                <span>Subtotal:</span>
                <span id="subtotalValue">R$ 0,00</span>
            </div>
            <div class="summary-line">
                <span>Frete:</span>
                <span id="shippingValue">R$ 0,00</span>
            </div>
            <div class="summary-line summary-total">
                <span>Total:</span>
                <span id="cartTotal">R$ 0,00</span>
            </div>
            <button class="btn-add" style="width: 100%; margin-top: 15px;" onclick="checkout()">Finalizar Compra</button>
        </div>
    </div>

    <section class="hero">
        <h1>Coleções Premium 2026</h1>
        <input type="text" id="searchInput" placeholder="O que você está procurando?">
    </section>

    <div class="filters-container">
        <button class="filter-btn active" data-filter="todos">Todos</button>
        <button class="filter-btn" data-filter="nike">Nike</button>
        <button class="filter-btn" data-filter="adidas">Adidas</button>
        <button class="filter-btn" data-filter="lacoste">Lacoste</button>
        <button class="filter-btn" data-filter="penalty">Penalty</button>
        <button class="filter-btn" data-filter="shein">Shein</button>
    </div>

    <main id="mainContainer"></main>

    <footer>
        <p>© 2026 Samuel Fashion Store. Todos os direitos reservados.</p>
    </footer>
</div>

<script src="script.js" defer></script>
</body>
</html>
