<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Samuel Fashion | Meu Perfil</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body style="display:flex; align-items:center; justify-content:center; height:100vh; background:#f0f2f5;">
<div class="card" style="width:100%; max-width:450px; padding:30px; text-align:center;">
    <h2>Personalizar Conta</h2>
    <p style="color:#64748b; font-size:0.9rem; margin-bottom:20px;">Altere seus dados de exibição da loja</p>
    
    <img id="p-preview" src="https://via.placeholder.com/150" style="width:100px; height:100px; border-radius:50%; object-fit:cover; margin-bottom:20px; border:3px solid #000;">
    
    <div style="display:flex; flex-direction:column; gap:15px; text-align:left;">
        <label style="font-weight:bold; font-size:0.85rem;">Nome de Exibição:</label>
        <input type="text" id="p-nome" placeholder="Seu nome">
        
        <label style="font-weight:bold; font-size:0.85rem;">URL da Foto de Perfil:</label>
        <input type="text" id="p-foto" placeholder="Cole o link de uma imagem da internet" oninput="document.getElementById('p-preview').src = this.value">
        
        <button class="btn btn-buy" onclick="salvarPerfil()">Salvar Alterações</button>
        <button class="btn" style="background:#e2e8f0; color:#0f172a;" onclick="window.location.href='index.html'">Voltar para a Loja</button>
    </div>
</div>

<script>
    const user = JSON.parse(localStorage.getItem('sf_user'));
    if (!user) { window.location.href = 'login.html'; }

    // Carrega os dados atuais nos campos
    document.getElementById('p-nome').value = user.name;
    document.getElementById('p-foto').value = user.photo || '';
    document.getElementById('p-preview').src = user.photo || 'https://api.dicebear.com/7.x/bottts/svg?seed=' + user.name;

    function salvarPerfil() {
        const novoNome = document.getElementById('p-nome').value.trim();
        const novaFoto = document.getElementById('p-foto').value.trim();
        
        if(!novoNome) return alert("O nome não pode ficar em branco.");

        user.name = novoNome;
        user.photo = novaFoto;

        // Grava as novas informações na memória do navegador
        localStorage.setItem('sf_user', JSON.stringify(user));
        alert("Perfil atualizado com sucesso!");
        window.location.href = 'index.html';
    }
</script>
</body>
</html>
